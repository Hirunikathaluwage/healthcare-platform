server:
  port: 8089

jwt:
  secret: mySecretKeyForJWTGenerationWithAtLeast32CharactersLong
  expiration: 3600000

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**
            - id: admin-service
              uri: http://localhost:8088
              predicates:
                - Path=/api/admin/**